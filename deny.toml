[graph]
targets = []
all-features = true

[advisories]
version = 2
yanked = "deny"
# Temporary exceptions for rustls-webpki advisories while the
# upstream rustls/tokio-tungstenite/serenity dependency chain catches up.
#
# RUSTSEC-2024-0388: `derivative` is unmaintained — pulled only transitively via
#   matrix-sdk-indexeddb; no first-party use.
# RUSTSEC-2026-0097: `rand` unsound with a custom logger using `rand::rng()` —
#   transitive via the Matrix/OTLP stacks; not how we use rand.
# RUSTSEC-2026-0173: `proc-macro-error2` is unmaintained — compile-time-only
#   proc macro pulled transitively via teloxide -> aquamarine; no runtime code.
#
# The following are *unmaintained* (not vulnerable) advisories pulled in
# transitively by `typst` (the render_pdf book/PDF backend). They are
# compile-time / render-only with no network or untrusted-input exposure.
# RUSTSEC-2024-0320: `yaml-rust` unmaintained — transitive in the typst stack.
# RUSTSEC-2024-0436: `paste` no longer maintained — compile-time proc macro.
# RUSTSEC-2025-0141: `bincode` 1.x unmaintained — transitive in the typst stack.
# RUSTSEC-2026-0192: `ttf-parser` unmaintained — font parsing throughout the
#   typst render stack (fontdb/rustybuzz/usvg); upstream suggests migrating to
#   `skrifa`, which typst has not done yet. No safe upgrade available.
#
# RUSTSEC-2026-0206: `rustybuzz` is unmaintained and transitive in typst 0.15
#   via krilla/usvg. Upstream recommends harfrust, but typst has no compatible
#   release using it yet. Remove this exception when the typst stack migrates.
#
# RUSTSEC-2026-0194 / RUSTSEC-2026-0195: `quick-xml` 0.38/0.39 DoS advisories
#   (quadratic dup-attribute check; unbounded NsReader allocation). Both copies
#   are transitive in the typst render stack (citationberg -> hayagriva, and
#   plist -> syntect), pinned by typst 0.15 — fixed upstream only in
#   quick-xml >=0.41, which the parents haven't adopted yet. render_pdf parses
#   local documents, not untrusted network XML. Remove once typst's chain
#   moves to quick-xml 0.41+.
ignore = [
  "RUSTSEC-2026-0049",
  "RUSTSEC-2026-0098",
  "RUSTSEC-2026-0099",
  "RUSTSEC-2024-0388",
  "RUSTSEC-2026-0097",
  "RUSTSEC-2026-0173",
  "RUSTSEC-2024-0320",
  "RUSTSEC-2024-0436",
  "RUSTSEC-2025-0141",
  "RUSTSEC-2026-0194",
  "RUSTSEC-2026-0195",
  "RUSTSEC-2026-0192",
  "RUSTSEC-2026-0206",
]

[bans]
# The current graph includes several unavoidable duplicate transitive versions
# across Matrix, Telegram, and OTLP stacks; keep bans focused on actual risks.
multiple-versions = "allow"
wildcards = "deny"
deny = []
skip = []
skip-tree = []

[licenses]
allow = [
  "0BSD",
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CDLA-Permissive-2.0",
  "ISC",
  "MPL-2.0",
  "Unicode-3.0",
  "Zlib",
]
confidence-threshold = 0.8
