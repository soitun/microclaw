name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  web:
    name: Web And Docs Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: node scripts/generate_docs_artifacts.mjs --check --no-website
      - run: npm --prefix web ci
      - run: npm --prefix web run build
      - name: Build website docs when workspace is present
        shell: bash
        run: |
          if [[ -f website/package-lock.json ]]; then
            npm --prefix website ci
            npm --prefix website run build
          else
            echo "website workspace not present in this checkout; skipping"
          fi

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: microclaw:test
          cache-from: type=gha,scope=ci-docker-build
          cache-to: type=gha,mode=max,scope=ci-docker-build

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-audit --locked
      - run: cargo install cargo-deny --locked
      - run: cargo audit
      - run: cargo deny check advisories bans licenses

  rust-ubuntu:
    name: Rust (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  rust-macos:
    name: Rust (macos-latest)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  stability-smoke:
    name: Stability Smoke
    runs-on: ubuntu-latest
    needs: [rust-ubuntu]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: scripts/ci/stability_smoke.sh

  build:
    name: Build (Release)
    runs-on: ubuntu-latest
    needs: [web, docker-build, security-audit, rust-ubuntu, rust-macos, stability-smoke]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm --prefix web ci
      - run: npm --prefix web run build
      - name: Build website docs when workspace is present
        shell: bash
        run: |
          if [[ -f website/package-lock.json ]]; then
            npm --prefix website ci
            npm --prefix website run build
          else
            echo "website workspace not present in this checkout; skipping"
          fi
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
