name: Release Assets

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to build/upload assets for (e.g. v0.0.36)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  verify-ci:
    name: Verify CI Passed
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout tag commit
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Ensure CI succeeded for tag commit
        env:
          GH_TOKEN: ${{ github.token }}
          CI_WAIT_TIMEOUT_SECONDS: "900"
          CI_WAIT_INTERVAL_SECONDS: "30"
          REQUIRED_CI_JOBS_JSON: '["Web And Docs Build","Docker Build","Security Audit","Rust (ubuntu-latest)","Rust (macos-latest)","Stability Smoke"]'
        shell: bash
        run: |
          TARGET_SHA="$(git rev-parse HEAD)"
          echo "Checking CI status for commit: ${TARGET_SHA}"
          elapsed=0
          timeout_seconds="${CI_WAIT_TIMEOUT_SECONDS}"
          interval_seconds="${CI_WAIT_INTERVAL_SECONDS}"

          while [[ "${elapsed}" -lt "${timeout_seconds}" ]]; do
            RUN_ID="$(
              gh run list \
                --repo "${GITHUB_REPOSITORY}" \
                --workflow "CI" \
                --commit "${TARGET_SHA}" \
                --json databaseId,createdAt \
                --jq 'sort_by(.createdAt) | reverse | .[0].databaseId'
            )"

            if [[ -z "${RUN_ID}" || "${RUN_ID}" == "null" ]]; then
              echo "CI run not found yet for commit ${TARGET_SHA}."
            else
              JOBS_JSON="$(
                gh run view "${RUN_ID}" \
                  --repo "${GITHUB_REPOSITORY}" \
                  --json jobs
              )"

              FAILED_JOB="$(
                jq -r --argjson required "${REQUIRED_CI_JOBS_JSON}" '
                  .jobs
                  | map(select(.name as $name | $required | index($name)))
                  | map(select(
                      .conclusion == "failure"
                      or .conclusion == "cancelled"
                      or .conclusion == "timed_out"
                      or .conclusion == "action_required"
                      or .conclusion == "startup_failure"
                      or .conclusion == "stale"
                    ))
                  | first
                  | if . == null then empty else "\(.name) \(.url)" end
                ' <<<"${JOBS_JSON}"
              )"

              if [[ -n "${FAILED_JOB}" ]]; then
                echo "Required CI job failed for commit ${TARGET_SHA}: ${FAILED_JOB}" >&2
                exit 1
              fi

              COMPLETED_REQUIRED_COUNT="$(
                jq -r --argjson required "${REQUIRED_CI_JOBS_JSON}" '
                  .jobs
                  | map(select(.name as $name | $required | index($name)))
                  | map(select(.conclusion == "success"))
                  | length
                ' <<<"${JOBS_JSON}"
              )"

              REQUIRED_COUNT="$(
                jq -r 'length' <<<"${REQUIRED_CI_JOBS_JSON}"
              )"

              if [[ "${COMPLETED_REQUIRED_COUNT}" -eq "${REQUIRED_COUNT}" ]]; then
                echo "Required CI jobs succeeded. Run id: ${RUN_ID}"
                exit 0
              fi

              echo "Waiting for required CI jobs (${COMPLETED_REQUIRED_COUNT}/${REQUIRED_COUNT}) on run ${RUN_ID}."
            fi

            sleep "${interval_seconds}"
            elapsed=$((elapsed + interval_seconds))
          done

          echo "Timed out waiting for required CI jobs after ${timeout_seconds}s." >&2
          echo "Recent CI runs for this commit:"
          gh run list \
            --repo "${GITHUB_REPOSITORY}" \
            --workflow "CI" \
            --commit "${TARGET_SHA}" \
            --json databaseId,status,conclusion,url \
            --jq '.[] | {id: .databaseId, status: .status, conclusion: .conclusion, url: .url}'
          exit 1

  build-assets:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    needs: verify-ci
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            os: ubuntu-latest
            bin: microclaw
            target_triple: x86_64-unknown-linux-gnu
            asset_triple: x86_64-linux-gnu
            archive_ext: tar.gz
          - label: linux-arm64
            os: ubuntu-24.04-arm
            bin: microclaw
            target_triple: aarch64-unknown-linux-gnu
            asset_triple: aarch64-linux-gnu
            archive_ext: tar.gz
          - label: macos-x86_64
            os: macos-15-intel
            bin: microclaw
            target_triple: x86_64-apple-darwin
            asset_triple: x86_64-apple-darwin
            archive_ext: tar.gz
          - label: macos-arm64
            os: macos-14
            bin: microclaw
            target_triple: aarch64-apple-darwin
            asset_triple: aarch64-apple-darwin
            archive_ext: tar.gz
          - label: windows-x86_64
            os: windows-latest
            bin: microclaw.exe
            target_triple: x86_64-pc-windows-msvc
            asset_triple: x86_64-windows-msvc
            archive_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build embedded web assets
        run: |
          npm --prefix web ci
          npm --prefix web run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Package archive (Linux)
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          RELEASE_VERSION="${RELEASE_TAG#v}"
          ASSET_NAME="microclaw-${RELEASE_VERSION}-${{ matrix.asset_triple }}.tar.gz"
          tar -czf "$ASSET_NAME" -C target/release "${{ matrix.bin }}"
          echo "ASSET_NAME=$ASSET_NAME" >> "$GITHUB_ENV"

      - name: Package archive (Windows)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          $releaseVersion = $env:RELEASE_TAG -replace '^v', ''
          $assetName = "microclaw-${releaseVersion}-${{ matrix.asset_triple }}.zip"
          Compress-Archive -Path "target/release/${{ matrix.bin }}" -DestinationPath $assetName -Force
          "ASSET_NAME=$assetName" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: ${{ env.ASSET_NAME }}
          if-no-files-found: error

  publish-container:
    name: Publish Container Image
    runs-on: ubuntu-latest
    needs: verify-ci
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Checkout tag commit
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare image names
        id: image_names
        shell: bash
        run: |
          {
            echo "images<<EOF"
            echo "ghcr.io/${GITHUB_REPOSITORY}"
            if [[ -n "${DOCKERHUB_USERNAME}" && -n "${DOCKERHUB_TOKEN}" ]]; then
              echo "docker.io/microclaw/microclaw"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Note Docker Hub publish status
        shell: bash
        run: |
          if [[ -n "${DOCKERHUB_USERNAME}" && -n "${DOCKERHUB_TOKEN}" ]]; then
            echo "Docker Hub publishing enabled for docker.io/microclaw/microclaw"
          else
            echo "Docker Hub publishing secrets are not configured; publishing GHCR only."
          fi

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image_names.outputs.images }}
          tags: |
            type=semver,pattern={{version}},value=${{ env.RELEASE_TAG }}
            type=semver,pattern={{major}}.{{minor}},value=${{ env.RELEASE_TAG }}
            type=semver,pattern={{major}},value=${{ env.RELEASE_TAG }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=MicroClaw
            org.opencontainers.image.description=Multi-channel agent runtime for Telegram, Discord, Web, and more.

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Log in to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=release-container
          cache-to: type=gha,mode=max,scope=release-container

  publish-assets:
    name: Upload to GitHub Release
    runs-on: ubuntu-latest
    needs: build-assets
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

    steps:
      - name: Checkout tag (full history for tag range)
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0
          fetch-tags: true

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          shasum -a 256 * > SHA256SUMS.txt

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PREV_TAG="$(git tag --list 'v*' --sort=-version:refname | awk -v current="${RELEASE_TAG}" '$0 != current { print; exit }')"
          if [[ -n "${PREV_TAG}" ]]; then
            echo "Generating release notes from range: ${PREV_TAG}..${RELEASE_TAG}"
          else
            echo "Generating release notes without a previous tag (first release or missing tags)"
          fi

          NOTES_FILE="$(mktemp)"
          GENERATE_ARGS=(
            gh api -X POST "repos/${GITHUB_REPOSITORY}/releases/generate-notes"
            -f "tag_name=${RELEASE_TAG}"
          )
          if [[ -n "${PREV_TAG}" ]]; then
            GENERATE_ARGS+=(-f "previous_tag_name=${PREV_TAG}")
          fi
          "${GENERATE_ARGS[@]}" --jq '.body' > "${NOTES_FILE}"

          if ! gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release create "${RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              -t "${RELEASE_TAG}" \
              --notes-file "${NOTES_FILE}"
          else
            gh release edit "${RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              -t "${RELEASE_TAG}" \
              --notes-file "${NOTES_FILE}"
          fi

          rm -f "${NOTES_FILE}"

      - name: Upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ls -lah dist
          gh release upload "${RELEASE_TAG}" dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
