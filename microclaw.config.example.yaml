# MicroClaw configuration
# Copy this file to microclaw.config.yaml and fill in the required values.
# LLM provider (anthropic, openai-codex, ollama, openai, openrouter, deepseek, google, etc.)
llm_provider: "anthropic"
# API key for LLM provider (optional for ollama; openai-codex supports OAuth or api_key)
api_key: ""
# Model name (leave empty for provider default)
model: ""
# Optional token pricing table for /usage cost estimation.
# Prices are USD per 1M tokens, matched by exact model name.
# Add a "*" row as fallback for unknown models if desired.
# model_prices:
#   - model: "claude-sonnet-4-5-20250929"
#     input_per_million_usd: 3.0
#     output_per_million_usd: 15.0
#   - model: "*"
#     input_per_million_usd: 0.0
#     output_per_million_usd: 0.0
# Custom base URL (optional, null to use provider default)
# llm_base_url: null

# Max tokens per response
max_tokens: 8192
# Max tool loop iterations per message
max_tool_iterations: 100
# Optional per-task auxiliary models. Each slot names a (typically cheaper) model
# used for a specific ancillary task instead of the main conversation model. The
# auxiliary model runs on the SAME provider/credentials as the main model — only
# the model name is swapped — and falls back to the main model when unset.
# aux_models:
#   compaction: claude-haiku-4-5   # cheaper model for context/history summarization
#   reflector: claude-haiku-4-5    # cheaper model for the background memory reflector
#   title: claude-haiku-4-5        # cheaper model for short session-title generation
#   vision: claude-haiku-4-5       # model for image description (overrides media.vision.model)
# Inject pending messages into the active agent loop between iterations (mid-turn injection)
enable_mid_turn_injection: true
# On non-web channels (Telegram, Discord, Slack, Feishu, Matrix, WeChat),
# send a small ack message when a mid-turn injection happens so the user
# sees their follow-up was received instead of waiting for the turn to end.
mid_turn_injection_echo: true
# Chat history context size
max_history_messages: 50
# Maximum inbound Telegram document size in MB
max_document_size_mb: 100
# Estimated token budget for injecting structured memories into system prompt
memory_token_budget: 1500
# Graph-augmented recall: expand the temporal knowledge graph from entities the
# query mentions and inject connected ("# Connected") facts the flat layers miss.
# Local-only (no embeddings/LLM); uses the graph the reflector already builds.
memory_graph_recall_enabled: true
memory_graph_max_hops: 2      # clamped to 1-3
memory_graph_max_triples: 10  # 0 disables
# Optional embedding runtime config (requires binary built with --features sqlite-vec)
# embedding_provider: "openai"   # openai | ollama
# embedding_api_key: ""
# embedding_base_url: ""
# embedding_model: "text-embedding-3-small"
# embedding_dim: 1536
# Data root directory:
# - runtime files go to <data_dir>/runtime
# - built-in/custom skills are loaded from <data_dir>/skills
data_dir: "./microclaw.data"
# Default working directory for file/bash/search tools.
# Relative paths used by tools are resolved from this directory.
working_dir: "./tmp"
# Working-dir isolation mode for bash/read_file/write_file/edit_file/glob/grep:
# - "shared": uses working_dir/shared
# - "chat": each chat uses working_dir/chat/<channel>/<chat_id>
# High-risk tool execution requires explicit user confirmation when true.
# Set false to auto-approve in-agent retry for high-risk tools (e.g. bash).
high_risk_tool_user_confirmation_required: true
working_dir_isolation: "chat"
# IANA timezone for scheduling (e.g. "US/Eastern", "Europe/London")
timezone: "UTC"

# Web-search backend used by the `web_search` and `deep_research` tools.
# Defaults to DuckDuckGo (no API key). A backend selected without its
# credentials/endpoint transparently degrades to DuckDuckGo instead of failing.
#   backend: duckduckgo | searxng | brave | tavily
#   searxng_base_url: self-hosted SearXNG instance (great on a $5 VPS; no key)
#   brave_api_key / tavily_api_key: API keys for the hosted providers
#   max_results: results per query (default 8, capped at 20)
# web_search:
#   backend: searxng
#   searxng_base_url: "http://127.0.0.1:8888"
#   brave_api_key: ""
#   tavily_api_key: ""
#   max_results: 8

# Outbound guardrail — scans delivered bot messages for credential-like strings
# (API keys, tokens, PEM private keys, Bearer/`api_key=` patterns) before they
# leave the bot. Off by default. `redact` masks the secret and still delivers;
# `block` withholds the whole message. Emails/phone numbers are NOT touched.
#   mode: off | redact | block
# output_guardrail:
#   mode: redact

# Pre-tool-call policy — a hard gate evaluated before every tool call.
# Off by default (no behavior change). `warn` executes the call but seals a
# violation entry into the tamper-evident audit log; `block` short-circuits
# the call with an error tool_result and audits it. `allow_tools` wins over
# `deny_tools`/`max_risk`. `max_risk` denies tools above the given built-in
# risk tier (low < medium < high); an invalid value fails closed.
# tool_policy:
#   mode: block
#   deny_tools: [bash]
#   max_risk: medium
#   allow_tools: []

# RTK (Rust Token Killer) integration — opt-in, off by default.
# When enabled, bash tool commands are passed through `rtk rewrite` before
# execution: commands RTK recognizes (git, cargo, npm, ls, grep, docker, ...)
# run as `rtk <command>` and return compressed output (60-90% fewer tokens);
# commands without an RTK equivalent run unchanged. Requires the rtk binary
# (https://github.com/rtk-ai/rtk) on the host. If a sandboxed execution
# environment lacks rtk, MicroClaw automatically falls back to the original
# command.
# rtk:
#   enabled: true
#   binary_path: "rtk"

# OpenAI API key for voice transcription via Whisper (optional)
# openai_api_key: ""

# Voice / Speech-to-text configuration
# voice_provider: "openai"  # "openai" uses OpenAI Whisper API (requires openai_api_key)
                          # "local" uses voice_transcription_command
# voice_transcription_command: "whisper-mlx --file {file}"  # Command template for local transcription
                                                               # Use {file} placeholder for the audio file path

# Session management
max_session_messages: 40
compact_keep_recent: 20

# Anthropic prompt caching (system_and_3 strategy).
# When enabled, microclaw inserts up to 4 cache_control breakpoints per
# request — system prompt + last 3 messages — so multi-turn chats hit the
# Anthropic prompt cache and re-use prior input tokens (~75% input cost
# reduction on long sessions). Anthropic-only; no effect on OpenAI-compat
# providers.
anthropic_prompt_cache_enabled: true
# "5m" or "1h". 1h requires extended-cache opt-in on the API key.
anthropic_prompt_cache_ttl: "5m"

# Filesystem checkpoints (off by default).
# When on, microclaw snapshots the chat's working_dir at the start of every
# agent turn into a shadow git repo under <data_dir>/checkpoints. Use
# `/rewind` to list, `/rewind <hash>` to restore. Requires `git` on PATH.
checkpoints_enabled: false

# Control chats can operate across chats (send_message/schedule/memory global/export/todo).
# Non-control chats are restricted to their own chat_id.
# control_chat_ids: []
# In group/server/channel chats, slash commands require @mention by default.
# Set true to allow slash commands without mention in those contexts.
# allow_group_slash_without_mention: false

# Observability / Monitoring (OpenTelemetry + adapters)
# observability:
#   # Shared OpenTelemetry resource attributes
#   service_name: "microclaw"
#
#   # Optional shared OTLP HTTP headers
#   # otlp_headers:
#   #   x-tenant-id: "tenant-a"
#   #   authorization: "Bearer <token>"
#
#   # Metrics export
#   otlp_enabled: false
#   otlp_endpoint: "http://127.0.0.1:4318/v1/metrics"
#   # Export interval for metrics reader
#   otlp_export_interval_seconds: 15
#
#   # Traces export (explicit endpoint mode)
#   otlp_tracing_enabled: false
#   otlp_tracing_endpoint: "http://127.0.0.1:4318/v1/traces"
#   # Optional queue tuning for high-throughput tracing
#   # otlp_tracing_max_queue_size: 8192
#   # otlp_tracing_max_export_batch_size: 512
#   # otlp_tracing_scheduled_delay_ms: 1000
#
#   # Logs export (tracing events -> OTLP via opentelemetry-appender-tracing)
#   otlp_logs_enabled: false
#   otlp_logs_endpoint: "http://127.0.0.1:4318/v1/logs"
#
#   # Adapter mode: Langfuse (auto-build trace endpoint + Basic auth header)
#   # langfuse_host: "https://cloud.langfuse.com" # or "http://127.0.0.1:3000" for self-hosted
#   # IMPORTANT: use host root only, do not use UI project URL like /project/<id>/traces
#   # langfuse_public_key: "pk-lf-..."
#   # langfuse_secret_key: "sk-lf-..."
#
#   # Adapter mode: AgentOps (Bearer auth; can override endpoint)
#   # agentops_api_key: "<agentops-api-key>"
#   # agentops_otlp_endpoint: "https://otlp.agentops.ai/v1/traces"

channels:
  web:
    enabled: true
  telegram:
    enabled: false
    bot_token: ""
    bot_username: ""
    # Telegram group allowlist (empty = allow all groups)
    # allowed_groups: []
    # Telegram DM allowlist by sender user_id (empty = allow all users in private chats)
    # allowed_user_ids: [123456789]
    # Multi-account example:
    # default_account: "main"
    # accounts:
    #   main:
    #     enabled: true
    #     bot_token: "123456:ABC-DEF..."
    #     bot_username: "my_bot"
    #     allowed_user_ids: [123456789]
    # Live progress heartbeat during long agent turns (off by default).
    # First trigger sends a "⏳ Working…" message, later updates edit it in
    # place, and it flips to "✅ Done" when the turn finishes. Supported on
    # telegram / discord / slack (same block shape under each channel).
    # progress_updates:
    #   enabled: true
    #   groups: false                # also emit in group chats (default: private only)
    #   min_turn_seconds: 30         # stay silent for turns shorter than this
    #   update_interval_seconds: 20  # edit throttle (≤3/min, under Telegram's edit cap)
  discord:
    enabled: false
    bot_token: ""
    # allowed_channels: []
    # progress_updates:            # same shape as channels.telegram.progress_updates
    #   enabled: true
  # slack:
  #   enabled: false
  #   bot_token: "xoxb-..."
  #   app_token: "xapp-..."
  #   allowed_channels: []
  #   progress_updates:            # same shape as channels.telegram.progress_updates
  #     enabled: true
  # feishu:
  #   enabled: false
  #   app_id: "cli_xxx"
  #   app_secret: "xxx"
  #   connection_mode: "websocket"   # "websocket" (default) or "webhook"
  #   domain: "feishu"               # "feishu" (China), "lark" (international), or custom URL
  #   allowed_chats: []
  #   # Webhook-only settings:
  #   # webhook_path: "/feishu/events"
  #   # verification_token: ""
  #   # encrypt_key: ""
  # matrix:
  #   enabled: false
  #   homeserver_url: "https://matrix.org"
  #   access_token: "syt_xxx"
  #   bot_user_id: "@microclaw:matrix.org"
  #   # allowed_room_ids: ["!roomid:matrix.org"]
  #   # allowed_user_ids: ["@alice:matrix.org"]   # DM sender allowlist (empty = allow all DMs)
  #   # mention_required: true
  # whatsapp:
  #   enabled: false
  #   access_token: "EAA..."
  #   phone_number_id: "1234567890"
  #   webhook_verify_token: ""
  #   webhook_path: "/whatsapp/webhook"
  #   # Optional sender allowlist
  #   # allowed_user_ids: ["15551234567"]
  #   # Optional Graph API version override
  #   # api_version: "v21.0"

# Agent-to-agent HTTP integration (optional)
# Exposes:
# - /.well-known/agent.json
# - /api/a2a/agent-card
# - /api/a2a/message
# Built-in tools:
# - a2a_list_peers
# - a2a_send
# a2a:
#   enabled: true
#   public_base_url: "https://planner.example.com"
#   agent_name: "Planner"
#   agent_description: "Routes work to specialized agents"
#   shared_tokens:
#     - "shared-a2a-token"
#   peers:
#     worker:
#       enabled: true
#       base_url: "https://worker.example.com"
#       bearer_token: "shared-a2a-token"
#       description: "Executes implementation tasks"
#       default_session_key: "a2a:worker"

# Local web UI (optional)
# Channel on/off is controlled by `channels.web.enabled`.
# Bind address for local web UI
web_host: "127.0.0.1"
# Port for local web UI
web_port: 10961
# Optional bearer token for Web API/UI.
# If set, requests must send Authorization: Bearer <token>
# web_auth_token: ""
# Max in-flight requests per session
web_max_inflight_per_session: 2
# Max requests allowed per session in rate window
web_max_requests_per_window: 8
# Rate limit window length (seconds)
web_rate_window_seconds: 10
# Buffered SSE event history per run for replay
web_run_history_limit: 512
# Idle cleanup TTL for web session quota/locks (seconds)
web_session_idle_ttl_seconds: 300

# Soul file: defines your bot's personality, voice, values, and behavior.
# Supports markdown format. If not set, checks data_dir/SOUL.md then ./SOUL.md.
# Per-chat overrides: place SOUL.md in <data_dir>/runtime/groups/<chat_id>/SOUL.md
# soul_path: "./SOUL.md"

# Plugin runtime
# Place plugin manifests in <data_dir>/plugins by default (or set a custom dir below).
# plugins:
#   enabled: true
#   dir: "~/microclaw.data/plugins"

# Recommended production sandbox baseline:
# sandbox:
#   mode: "all"
#   backend: "auto"
#   security_profile: "hardened"
#   no_network: true
#   require_runtime: true
#   # mount_allowlist_path: "~/.microclaw/sandbox-mount-allowlist.txt"

# Concurrent sub-agents (the "specialist team" that runs tasks in the background).
# All fields are optional and shown with their defaults.
# subagents:
#   max_concurrent: 4              # global cap on simultaneously running sub-agents
#   max_active_per_chat: 5         # cap on active runs per chat
#   run_timeout_secs: 900          # per-run timeout
#   announce_to_chat: false        # keep internal run details out of user chats; opt in for debugging
#   fan_in_summary: false          # when a batch of child tasks all finish, post one combined summary
#   progress_reports: false        # keep progress internal; opt in to post mid-run updates to chat
#   # How often a long-running sub-agent may post a "📊 progress" update (seconds).
#   progress_min_interval_secs: 45
#   # Proactive task standup: periodically post a one-line status for tasks that
#   # have been running a while. OFF by default since it sends unprompted messages.
#   standup:
#     enabled: false
#     interval_secs: 1800          # min seconds between standups per chat

# Proactive long-silence check-in: after a chat is quiet for a while, let the bot
# reach out IF it has something genuinely useful to say. OFF by default (it sends
# unprompted messages and uses an LLM call per idle chat).
# idle_checkin:
#   enabled: false
#   idle_hours: 24                 # only consider a chat idle after this many hours of silence
#   min_interval_hours: 24         # at most one check-in per chat per this many hours

# Proactive heartbeat (OpenClaw-style): every interval, read each chat's
# runtime/groups/<chat_id>/HEARTBEAT.md checklist and run an agent turn over it;
# the bot messages the chat only when something on the list needs attention.
# OFF by default — chats without a HEARTBEAT.md file are never touched, so
# enabling the loop changes nothing until a checklist exists.
# heartbeat:
#   enabled: false
#   interval_mins: 30              # minutes between heartbeat sweeps
#   max_chars: 8000                # max HEARTBEAT.md chars injected into the prompt

# Per-chat token budget: once a chat's rolling-24h token total (input+output,
# across agent turns, sub-agent runs, compaction — everything logged for the
# chat) reaches daily_per_chat, new agent turns are refused until usage rolls
# out of the window. Proactive turns (heartbeat, idle check-in, scheduled
# tasks) are refused silently, so a capped chat stops consuming instead of
# being spammed. Enforced at turn start: a turn or background sub-agent
# already in flight finishes and may overshoot. 0 = unlimited (default).
# Control chats are exempt by default so operators can always reach the bot.
# token_budget:
#   daily_per_chat: 0
#   exempt_control_chats: true

# "Sleep-time" memory consolidation: when a chat is idle, run a deterministic
# (no-LLM) background pass that archives near-duplicate memories so the store stops
# accumulating redundancy between reflector runs. PROFILE memories are never touched,
# archiving is reversible, and the pass is capped + throttled. OFF by default.
# sleep_time:
#   enabled: false
#   idle_hours: 6                  # only consolidate a chat after this many hours of silence
#   min_interval_hours: 24         # at most one consolidation pass per chat per this many hours
#   similarity_threshold: 0.82     # Jaccard similarity at/above which same-category memories are duplicates
#   max_archived_per_pass: 20      # safety cap on archives per chat per pass

# "Inner thoughts" interjection: in an active group chat where the bot wasn't
# addressed, occasionally chime in IF it has something genuinely worth saying.
# OFF by default (it speaks unprompted in groups and uses an LLM call per check).
# interjection:
#   enabled: false
#   min_interval_secs: 900         # at most one unprompted interjection per chat per this window
#   lookback_mins: 10              # only consider chats with user messages this recent

# Multimedia tools. All OFF by default. Credentials are shared via media.api_key
# / media.base_url (falling back to MICROCLAW_OPENAI_API_KEY, OPENAI_API_KEY, or
# top-level openai_api_key / openai_base_url). Individual tools may override the
# endpoint + key (e.g. point TTS at a dedicated speech provider). Enable only the
# tools you want the bot to use.
# media:
#   # api_key: ""                  # shared key for all media tools (below)
#   # base_url: ""                 # shared OpenAI-compatible endpoint (default api.openai.com/v1)
#   image_gen:
#     enabled: false               # generate_image tool
#   tts:
#     enabled: false               # text_to_speech tool (also required by podcast)
#     model: tts-1
#     default_voice: alloy
#     # base_url: ""               # TTS-specific endpoint override (falls back to media.base_url)
#     # api_key: ""                # TTS-specific key override (falls back to media.api_key)
#   # Generate a book → PDF (render_pdf tool). Pure-Rust, self-contained, no
#   # external binaries. For CJK (Chinese/Japanese/Korean) output, point
#   # font_path at a single-face TrueType (.ttf) CJK font.
#   book:
#     enabled: false
#     page_size: A4                # A4 or Letter
#     # font_path: /System/Library/Fonts/Supplemental/Arial Unicode.ttf
#   # Generate a podcast episode (generate_podcast tool). Needs media.tts enabled
#   # and an ffmpeg binary on PATH (or set ffmpeg_path).
#   podcast:
#     enabled: false
#     ffmpeg_path: ffmpeg
#     default_voice: alloy
#     segment_pause_ms: 500        # silence inserted between segments
#     # base_url: ""               # podcast-specific endpoint (falls back to media.tts.base_url)
#     # api_key: ""                # podcast-specific key (falls back to media.tts.api_key)
